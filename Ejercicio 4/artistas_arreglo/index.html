<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artistas</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 40px 20px;
            background-color: #f5f7fb;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 760px;
        }
        h1 {
            text-align: center;
            margin-bottom: 18px;
            font-size: 1.6rem;
            color: #2f3b4a;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            background-color: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(31,41,55,0.08);
        }
        th, td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid #edf2f7;
        }
        th {
            background: linear-gradient(90deg,#4CAF50,#43a047);
            color: white;
            font-weight: 600;
        }
        tbody tr:hover {
            background-color: #f1f6f9;
        }
        tbody tr:nth-child(even) {
            background-color: #fbfdff;
        }
    </style>
</head>
<body>
    <h1>Tabla de Artistas</h1>
    <table>
        <thead>
            <tr>
                <th>Artista</th>
                <th>Album</th>
                <th>Grammys</th>
                <th>Año</th>
            </tr>
        </thead>
        <tbody id="tablaDatos">
        </tbody>
    </table>

    <script src="script.js"></script>
</body>
</html>
