<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Círculo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="card shadow p-4">
            <h3 class="text-center mb-4">Calculadora de Círculo</h3>

            <div class="mb-3">
                <label for="radio" class="form-label">Ingresa el radio:</label>
                <input type="number" id="radio" class="form-control" placeholder="Ej. 5">
            </div>

            <div class="d-grid gap-2">
                <button class="btn btn-primary" onclick="calcular()">Calcular</button>
            </div>

            <div class="mt-4">
                <p><strong>Área:</strong> <span id="area">-</span></p>
                <p><strong>Circunferencia:</strong> <span id="circunferencia">-</span></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
